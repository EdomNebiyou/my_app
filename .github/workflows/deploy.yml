name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build frontend
      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      # Build backend
      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      # Deploy to EC2
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Fix permissions using sudo so ec2-user can write here
            sudo mkdir -p /var/www
            sudo chown -R ec2-user:ec2-user /var/www
            cd /var/www

            # 2. Check if the project directory exists
            if [ ! -d "/var/www/my_app" ]; then
              git clone https://github.com my_app
              cd my_app
            else
              cd my_app
              git pull origin main
            fi

            # 3. Backend deployment
            cd backend
            # Use 'npm install' instead of 'npm ci' if package-lock.json doesn't exist
            npm install
            
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" > .env
            echo "JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}" >> .env
            echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> .env
            echo "PORT=${{ secrets.PORT }}" >> .env
            
            pm2 restart backend || pm2 start server.js --name backend

            # 4. Frontend deployment
            cd ../frontend
            npm install
            npm run build
            
            # Make sure Nginx has read access to the newly built files
            sudo chown -R ec2-user:nginx /var/www/my_app
            sudo chmod -R 755 /var/www/my_app
            sudo systemctl restart nginx
